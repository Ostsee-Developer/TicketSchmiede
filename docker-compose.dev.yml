version: "3.9"

# ============================================================
# Ticket Schmiede - Development Docker Compose
# Usage: docker compose -f docker-compose.dev.yml up
# ============================================================

networks:
  ticketschmiede_dev_net:
    driver: bridge

volumes:
  postgres_dev_data:
    driver: local

services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketschmiede_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ticketschmiede_dev
      POSTGRES_USER: ticketschmiede
      POSTGRES_PASSWORD: devpassword
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - ticketschmiede_dev_net
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketschmiede -d ticketschmiede_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ticketschmiede_app_dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://ticketschmiede:devpassword@postgres:5432/ticketschmiede_dev?schema=public
      AUTH_SECRET: dev_secret_at_least_32_characters_long_here
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - ticketschmiede_dev_net
    ports:
      - "3000:3000"
